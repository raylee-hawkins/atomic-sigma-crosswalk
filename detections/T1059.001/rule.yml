title: Encoded PowerShell Execution with Outbound C2 Beacon
id: 7f3a9c2e-1b4d-4e8f-a6c0-9d2e5f7b3a1c
status: experimental
description: >
    Detects encoded PowerShell execution followed by an outbound network
    connection from the same process within a 5-minute window. Validated
    against Atomic Red Team T1059.001 telemetry from a two-node lab
    (Kali Linux attacker, Windows victim). Correlation anchored on
    ProcessGuid across Sysmon EID 1 and EID 3.
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://attack.mitre.org/techniques/T1071/001/
    - https://github.com/Bobby-Okafor/DetectionLab
author: Bobby Okafor
date: 2026/06/28
tags:
    - attack.execution
    - attack.t1059.001
    - attack.command_and_control
    - attack.t1071.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_process:
        EventID: 1
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - ' -EncodedCommand '
            - ' -enc '
            - ' -ec '
    filter_legitimate:
        CommandLine|contains:
            - 'MicrosoftEdge'
            - 'SenseIR'
            - 'IntelliJ'
    condition: selection_process and not filter_legitimate
falsepositives:
    - Legitimate administrative scripts using encoded commands
    - Software deployment tools using encoded PowerShell
    - SCCM and endpoint management platforms
level: high
fields:
    - ProcessGuid
    - CommandLine
    - ParentImage
    - User
    - Host
notes: >
    This rule covers the process creation side of the correlation.
    Full signal confidence requires a corresponding Sysmon EID 3
    network connection event sharing the same ProcessGuid within
    300 seconds. A standalone EID 1 match is classified as
    INVESTIGATE tier, not SIGNAL tier, in the Signal Proof pipeline.
    Translation notes comparing Splunk SPL and Sentinel KQL field
    mapping gaps documented in notes.md.